version: 2

project_name: tit

before:
  hooks:
    - go mod tidy

builds:
  - id: tit
    binary: "tit_{{ .Os }}_{{ .Arch }}"
    main: ./cmd/tit
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/jrengmusic/tit/internal.AppVersion={{.Version}}
    hooks:
      post:
        - cmd: ./scripts/post-build.sh
          output: true
          env:
            - HOOK_TARGET={{ .Target }}
            - HOOK_PATH={{ .Path }}

archives:
  - format: binary
    name_template: "{{ .Binary }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: jrengmusic
    name: tit
  draft: false
  prerelease: auto
